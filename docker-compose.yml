services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/levelup-ai
      JWT_SECRET: change-me-in-production
    ports:
      - '4000:4000'
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:4000/api
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - '5173:5173'
    depends_on:
      - server

volumes:
  mongo_data:
